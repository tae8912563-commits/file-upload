<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>서류 보관함</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --accent: #4f8eff;
    --accent2: #7c5cfc;
    --text: #e8eaf0;
    --text2: #8b90a7;
    --border: #2e3350;
    --danger: #ff4f6a;
    --success: #2ecc8f;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── 로그인 화면 ── */
  #login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background: radial-gradient(ellipse at 60% 30%, #1a2240 0%, #0f1117 70%);
  }

  .login-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px 40px;
    width: 100%;
    max-width: 400px;
  }

  .login-box h1 {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 6px;
    letter-spacing: -0.5px;
  }

  .login-box p {
    color: var(--text2);
    font-size: 14px;
    margin-bottom: 36px;
  }

  .field { margin-bottom: 16px; }

  .field label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text2);
    margin-bottom: 8px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .field input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    color: var(--text);
    font-size: 15px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }

  .field input:focus { border-color: var(--accent); }

  .btn {
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: var(--radius);
    font-size: 15px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }

  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    margin-top: 8px;
  }

  .btn-primary:hover:not(:disabled) { opacity: 0.88; }

  .error-msg {
    background: rgba(255,79,106,0.12);
    border: 1px solid rgba(255,79,106,0.3);
    border-radius: 8px;
    color: var(--danger);
    font-size: 13px;
    padding: 12px 14px;
    margin-top: 14px;
    display: none;
  }

  /* ── 메인 앱 ── */
  #app { display: none; min-height: 100vh; }

  /* 헤더 */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-left { display: flex; align-items: center; gap: 12px; }

  .header h2 {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  .role-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 0.3px;
  }

  .role-admin { background: rgba(124,92,252,0.2); color: #a78bfa; }
  .role-user  { background: rgba(79,142,255,0.2); color: #7ab3ff; }

  .btn-logout {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text2);
    font-size: 13px;
    font-family: inherit;
    padding: 7px 14px;
    cursor: pointer;
    transition: color 0.2s;
  }

  .btn-logout:hover { color: var(--danger); }

  /* 콘텐츠 */
  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 32px 20px;
  }

  /* 섹션 타이틀 */
  .section-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text2);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  /* 업로드 영역 */
  .upload-area {
    border: 2px dashed var(--border);
    border-radius: 16px;
    padding: 48px 24px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    margin-bottom: 32px;
    position: relative;
  }

  .upload-area:hover, .upload-area.drag-over {
    border-color: var(--accent);
    background: rgba(79,142,255,0.05);
  }

  .upload-area input[type=file] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .upload-icon {
    width: 48px;
    height: 48px;
    background: var(--surface2);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
    font-size: 22px;
  }

  .upload-area h3 {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 6px;
  }

  .upload-area p {
    font-size: 13px;
    color: var(--text2);
  }

  /* 진행바 */
  .progress-wrap {
    background: var(--surface2);
    border-radius: 4px;
    height: 4px;
    margin-top: 20px;
    overflow: hidden;
    display: none;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 4px;
    transition: width 0.3s;
    width: 0%;
  }

  /* 파일 목록 */
  .files-grid {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .file-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: border-color 0.2s;
  }

  .file-card:hover { border-color: var(--accent); }

  .file-icon {
    width: 40px;
    height: 40px;
    background: var(--surface2);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .file-info { flex: 1; min-width: 0; }

  .file-name {
    font-size: 14px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .file-meta {
    font-size: 12px;
    color: var(--text2);
    margin-top: 3px;
  }

  .file-actions { display: flex; gap: 8px; flex-shrink: 0; }

  .btn-icon {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text2);
    font-size: 13px;
    font-family: inherit;
    padding: 6px 12px;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
    white-space: nowrap;
  }

  .btn-icon:hover { color: var(--accent); border-color: var(--accent); }
  .btn-del:hover  { color: var(--danger); border-color: var(--danger); }

  .empty-state {
    text-align: center;
    padding: 48px 0;
    color: var(--text2);
    font-size: 14px;
  }

  /* 관리자 - 담당자 목록 */
  .user-tabs {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }

  .tab {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text2);
    font-size: 13px;
    font-weight: 500;
    font-family: inherit;
    padding: 8px 16px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* 관리자 - 담당자 추가 */
  .add-user-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 32px;
  }

  .add-user-box h3 {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 16px;
  }

  .add-user-fields {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr auto;
    gap: 10px;
    align-items: end;
  }

  .add-user-fields .field { margin-bottom: 0; }

  .btn-add {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: var(--radius);
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    padding: 14px 20px;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.2s;
  }

  .btn-add:hover { opacity: 0.85; }

  /* 토스트 */
  #toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 20px;
    font-size: 14px;
    opacity: 0;
    transition: all 0.3s;
    z-index: 999;
    white-space: nowrap;
  }

  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  #toast.success { border-color: var(--success); color: var(--success); }
  #toast.error   { border-color: var(--danger);  color: var(--danger);  }

  /* 로딩 */
  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* 반응형 */
  @media (max-width: 600px) {
    .add-user-fields {
      grid-template-columns: 1fr;
    }
    .login-box { padding: 36px 24px; }
    .file-actions .btn-icon span { display: none; }
  }
</style>
</head>
<body>

<!-- 로그인 -->
<div id="login-screen">
  <div class="login-box">
    <h1>서류 보관함</h1>
    <p>담당자 이메일로 로그인하세요</p>
    <div class="field">
      <label>이메일</label>
      <input type="email" id="login-email" placeholder="email@example.com">
    </div>
    <div class="field">
      <label>비밀번호</label>
      <input type="password" id="login-pw" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn btn-primary" id="login-btn" onclick="doLogin()">로그인</button>
    <div class="error-msg" id="login-error"></div>
  </div>
</div>

<!-- 메인 앱 -->
<div id="app">
  <div class="header">
    <div class="header-left">
      <h2>서류 보관함</h2>
      <span class="role-badge" id="role-badge"></span>
    </div>
    <div style="display:flex;align-items:center;gap:12px">
      <span style="font-size:13px;color:var(--text2)" id="user-name-label"></span>
      <button class="btn-logout" onclick="doLogout()">로그아웃</button>
    </div>
  </div>

  <div class="container" id="main-content"></div>
</div>

<div id="toast"></div>

<script>
const SUPABASE_URL = 'https://rjhhpnyfochspuznxuox.supabase.co';
const SUPABASE_KEY = 'sb_publishable_XX_4hSo69x8MpCcK6k7TsQ_mZtJq3q6';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let currentProfile = null;
let adminTab = null;

// ── 유틸 ──
function toast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  setTimeout(() => t.className = '', 2800);
}

function formatSize(bytes) {
  if (!bytes) return '-';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(0) + ' KB';
  return (bytes/1024/1024).toFixed(1) + ' MB';
}

function formatDate(str) {
  const d = new Date(str);
  return d.toLocaleDateString('ko-KR') + ' ' + d.toLocaleTimeString('ko-KR', {hour:'2-digit',minute:'2-digit'});
}

function fileEmoji(name) {
  const ext = name.split('.').pop().toLowerCase();
  if (['jpg','jpeg','png','gif','webp','heic'].includes(ext)) return '🖼️';
  if (ext === 'pdf') return '📄';
  if (['doc','docx'].includes(ext)) return '📝';
  if (['xls','xlsx'].includes(ext)) return '📊';
  return '📎';
}

// 이미지 압축
async function compressImage(file) {
  if (!file.type.startsWith('image/')) return file;
  return new Promise(resolve => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      const MAX = 1200;
      let w = img.width, h = img.height;
      if (w > MAX || h > MAX) {
        if (w > h) { h = Math.round(h*MAX/w); w = MAX; }
        else { w = Math.round(w*MAX/h); h = MAX; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      canvas.toBlob(blob => {
        URL.revokeObjectURL(url);
        resolve(new File([blob], file.name.replace(/\.[^.]+$/, '.jpg'), {type:'image/jpeg'}));
      }, 'image/jpeg', 0.82);
    };
    img.src = url;
  });
}

// ── 로그인/로그아웃 ──
async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pw    = document.getElementById('login-pw').value;
  const btn   = document.getElementById('login-btn');
  const err   = document.getElementById('login-error');
  err.style.display = 'none';
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>로그인 중...';

  try {
    const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });
    if (error) throw error;
    currentUser = data.user;
    await loadProfile();
    showApp();
  } catch(e) {
    err.textContent = '이메일 또는 비밀번호가 올바르지 않습니다.';
    err.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = '로그인';
  }
}

async function doLogout() {
  await sb.auth.signOut();
  currentUser = null; currentProfile = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
}

async function loadProfile() {
  const { data } = await sb.from('profiles').select('*').eq('email', currentUser.email).single();
  currentProfile = data;
}

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('user-name-label').textContent = currentProfile.name;
  const badge = document.getElementById('role-badge');
  if (currentProfile.role === 'admin') {
    badge.textContent = '관리자'; badge.className = 'role-badge role-admin';
    renderAdmin();
  } else {
    badge.textContent = '담당자'; badge.className = 'role-badge role-user';
    renderUser();
  }
}

// ── 담당자 화면 ──
async function renderUser() {
  const c = document.getElementById('main-content');
  c.innerHTML = `
    <p class="section-title">내 서류 업로드</p>
    <div class="upload-area" id="upload-area">
      <input type="file" id="file-input" multiple accept="image/*,.pdf,.doc,.docx,.xls,.xlsx">
      <div class="upload-icon">📁</div>
      <h3>파일을 여기 끌어다 놓거나 탭하여 선택</h3>
      <p>사진, PDF, 문서 등 지원 · 이미지는 자동 압축됩니다</p>
      <div class="progress-wrap" id="progress-wrap">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
    </div>
    <p class="section-title">업로드된 서류</p>
    <div class="files-grid" id="files-grid"></div>
  `;

  document.getElementById('file-input').addEventListener('change', e => uploadFiles(e.target.files));
  const ua = document.getElementById('upload-area');
  ua.addEventListener('dragover', e => { e.preventDefault(); ua.classList.add('drag-over'); });
  ua.addEventListener('dragleave', () => ua.classList.remove('drag-over'));
  ua.addEventListener('drop', e => { e.preventDefault(); ua.classList.remove('drag-over'); uploadFiles(e.dataTransfer.files); });

  await loadUserFiles(currentProfile.folder_name);
}

async function uploadFiles(fileList) {
  const pw = document.getElementById('progress-wrap');
  const pb = document.getElementById('progress-bar');
  pw.style.display = 'block'; pb.style.width = '0%';

  let done = 0;
  for (let raw of fileList) {
    const file = await compressImage(raw);
    const path = `${currentProfile.folder_name}/${Date.now()}_${file.name}`;
    const { error } = await sb.storage.from('files').upload(path, file);
    if (!error) {
      await sb.from('files').insert({
        user_id: currentProfile.id,
        file_name: file.name,
        file_path: path,
        file_size: file.size
      });
    }
    done++;
    pb.style.width = (done / fileList.length * 100) + '%';
  }

  setTimeout(() => { pw.style.display = 'none'; }, 600);
  toast('업로드 완료!');
  await loadUserFiles(currentProfile.folder_name);
}

async function loadUserFiles(folder) {
  const { data } = await sb.from('files').select('*').eq('user_id', currentProfile.id).order('uploaded_at', {ascending:false});
  renderFiles(data || [], 'files-grid', false);
}

function renderFiles(files, gridId, isAdmin) {
  const grid = document.getElementById(gridId);
  if (!files.length) {
    grid.innerHTML = '<div class="empty-state">업로드된 서류가 없습니다</div>';
    return;
  }
  grid.innerHTML = files.map(f => `
    <div class="file-card">
      <div class="file-icon">${fileEmoji(f.file_name)}</div>
      <div class="file-info">
        <div class="file-name">${f.file_name}</div>
        <div class="file-meta">${formatSize(f.file_size)} · ${formatDate(f.uploaded_at)}</div>
      </div>
      <div class="file-actions">
        <button class="btn-icon" onclick="downloadFile('${f.file_path}','${f.file_name}')">⬇ <span>다운로드</span></button>
        ${isAdmin ? '' : `<button class="btn-icon btn-del" onclick="deleteFile('${f.id}','${f.file_path}','${gridId}',${isAdmin})">✕</button>`}
      </div>
    </div>
  `).join('');
}

async function downloadFile(path, name) {
  const { data } = await sb.storage.from('files').download(path);
  if (!data) return toast('다운로드 실패', 'error');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(data);
  a.download = name;
  a.click();
}

async function deleteFile(id, path, gridId, isAdmin) {
  if (!confirm('삭제하시겠습니까?')) return;
  await sb.storage.from('files').remove([path]);
  await sb.from('files').delete().eq('id', id);
  toast('삭제되었습니다');
  if (isAdmin) await loadAdminFiles(adminTab);
  else await loadUserFiles(currentProfile.folder_name);
}

// ── 관리자 화면 ──
async function renderAdmin() {
  const c = document.getElementById('main-content');
  c.innerHTML = `
    <p class="section-title">담당자 관리</p>
    <div class="add-user-box">
      <h3>담당자 추가</h3>
      <div class="add-user-fields">
        <div class="field"><label>이름</label><input id="new-name" placeholder="홍길동"></div>
        <div class="field"><label>이메일</label><input id="new-email" type="email" placeholder="hong@example.com"></div>
        <div class="field"><label>폴더명 (영문)</label><input id="new-folder" placeholder="hong"></div>
        <button class="btn-add" onclick="addUser()">추가</button>
      </div>
    </div>
    <p class="section-title">담당자별 서류</p>
    <div class="user-tabs" id="user-tabs"></div>
    <div class="files-grid" id="admin-files-grid"></div>
  `;
  await loadUsers();
}

async function loadUsers() {
  const { data } = await sb.from('profiles').select('*').eq('role','user').order('name');
  const tabs = document.getElementById('user-tabs');
  if (!data || !data.length) {
    tabs.innerHTML = '<span style="color:var(--text2);font-size:13px">등록된 담당자가 없습니다</span>';
    return;
  }
  tabs.innerHTML = data.map(u => `
    <button class="tab" onclick="selectTab('${u.folder_name}','${u.id}',this)">${u.name}</button>
  `).join('');
  tabs.querySelector('.tab').click();
}

async function selectTab(folder, userId, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  adminTab = { folder, userId };
  await loadAdminFiles(adminTab);
}

async function loadAdminFiles(tab) {
  const { data } = await sb.from('files').select('*').eq('user_id', tab.userId).order('uploaded_at',{ascending:false});
  renderFiles(data || [], 'admin-files-grid', true);
}

async function addUser() {
  const name   = document.getElementById('new-name').value.trim();
  const email  = document.getElementById('new-email').value.trim();
  const folder = document.getElementById('new-folder').value.trim().toLowerCase().replace(/\s/g,'');
  if (!name || !email || !folder) return toast('모든 항목을 입력하세요', 'error');

  // Supabase Auth 계정 생성 (임시 비밀번호: 이름+1234)
  const tempPw = folder + '1234!';
  const { data: authData, error: authErr } = await sb.auth.admin.createUser({
    email, password: tempPw, email_confirm: true
  });

  if (authErr) {
    // auth 없이 profiles만 추가 (관리자가 직접 비밀번호 설정)
  }

  const { error } = await sb.from('profiles').insert({ email, name, role:'user', folder_name: folder });
  if (error) return toast('추가 실패: ' + error.message, 'error');

  toast(`${name} 추가 완료! 임시 비밀번호: ${tempPw}`);
  document.getElementById('new-name').value = '';
  document.getElementById('new-email').value = '';
  document.getElementById('new-folder').value = '';
  await loadUsers();
}

// ── 세션 복원 ──
